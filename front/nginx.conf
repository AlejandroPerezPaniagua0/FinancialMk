# FinancialMk front · Nginx config
#
# Serves the React SPA bundle and proxies API + sanctum CSRF + auth
# routes to the back service over the docker network.

server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # ── Gzip ──────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ── Security headers (sane defaults) ──────────────────────────────────
    add_header X-Frame-Options             "SAMEORIGIN" always;
    add_header X-Content-Type-Options      "nosniff" always;
    add_header Referrer-Policy             "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy          "geolocation=(), microphone=(), camera=()" always;

    # ── Long cache for hashed assets ──────────────────────────────────────
    location ~* \.(?:js|css|woff2?|ttf|otf|eot|svg|gif|png|jpg|jpeg|webp|ico)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── API: proxy to back ───────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://back:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ── Health check passthrough (optional) ──────────────────────────────
    location = /up {
        proxy_pass http://back:8000/up;
    }

    # ── Welcome / landing served by Laravel Blade ────────────────────────
    location = /welcome {
        proxy_pass http://back:8000/;
    }

    # ── SPA fallback ──────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
