name: 🐛 Bug report
description: Something is broken or behaves unexpectedly.
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please fill out the fields below — it really helps reproduce the issue quickly.

        **Security issue?** Please do NOT use this template. See [SECURITY.md](../../SECURITY.md).

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: When I click X on the comparison page, the chart shows...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
      placeholder: I expected the chart to show...
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal, ordered steps. If you have a failing test, even better.
      placeholder: |
        1. docker compose up
        2. Open http://localhost:8080
        3. Log in with demo account
        4. Click ...
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Output of `git rev-parse --short HEAD` or the release tag.
      placeholder: e.g. v0.5.1 or commit a1b2c3d
    validations:
      required: true

  - type: dropdown
    id: install
    attributes:
      label: How did you install?
      options:
        - Docker Compose (recommended)
        - Bare metal (PHP + npm)
        - Other (please describe)
    validations:
      required: true

  - type: dropdown
    id: provider
    attributes:
      label: Market data provider
      options:
        - twelve_data
        - stooq
        - other / not relevant
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Relevant output from `storage/logs/laravel.log`, browser console, or `docker compose logs`.
      render: shell

  - type: textarea
    id: env
    attributes:
      label: Environment
      description: OS, PHP version, browser, anything else relevant.
      placeholder: macOS 14.5, PHP 8.3.7, Chrome 130
